```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>よけてゴールゲーム</title>

<style>

body{
    margin:0;
    background:#222;
    text-align:center;
    font-family:sans-serif;
    color:white;
}

h1{
    margin:10px;
}

#game{
    position:relative;
    width:300px;
    height:500px;
    background:#333;
    margin:auto;
    overflow:hidden;
    border:3px solid white;
}

#player{
    position:absolute;
    width:40px;
    height:40px;
    background:#4ecbff;
    bottom:10px;
    left:130px;
    border-radius:10px;
}

.obstacle{
    position:absolute;
    width:50px;
    height:20px;
    background:red;
}

#goal{
    position:absolute;
    top:0;
    width:100%;
    height:20px;
    background:gold;
}

.controls{
    margin-top:15px;
}

button{
    font-size:24px;
    padding:10px 30px;
    margin:5px;
}

</style>
</head>

<body>

<h1>🏃 ゴールを目指せ！</h1>

<div id="game">

<div id="goal"></div>

<div id="player"></div>

</div>

<div class="controls">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveRight()">➡</button>
</div>

<p id="message"></p>

<script>

const player = document.getElementById("player");
const game = document.getElementById("game");
const message = document.getElementById("message");

let playerX = 130;
let playerY = 450;

let obstacles = [];

function moveLeft(){
    playerX -= 30;
    if(playerX < 0) playerX = 0;
    player.style.left = playerX + "px";
}

function moveRight(){
    playerX += 30;
    if(playerX > 260) playerX = 260;
    player.style.left = playerX + "px";
}

function createObstacle(){

    const obs = document.createElement("div");
    obs.classList.add("obstacle");

    obs.style.left = Math.random()*250 + "px";
    obs.style.top = "0px";

    game.appendChild(obs);

    obstacles.push(obs);
}

function gameLoop(){

    playerY -= 1;
    player.style.bottom = (500-playerY) + "px";

    obstacles.forEach((obs,index)=>{

        let top = parseInt(obs.style.top);

        obs.style.top = top + 2 + "px";

        const rect1 = player.getBoundingClientRect();
        const rect2 = obs.getBoundingClientRect();

        if(
            rect1.left < rect2.right &&
            rect1.right > rect2.left &&
            rect1.top < rect2.bottom &&
            rect1.bottom > rect2.top
        ){
            message.innerText="💥 ゲームオーバー";
            clearInterval(loop);
        }

        if(top > 500){
            obs.remove();
            obstacles.splice(index,1);
        }

    });

    if(playerY < 20){
        message.innerText="🎉 ゴール！！";
        clearInterval(loop);
    }

}

setInterval(createObstacle,1200);

const loop = setInterval(gameLoop,30);

</script>

</body>
</html>
